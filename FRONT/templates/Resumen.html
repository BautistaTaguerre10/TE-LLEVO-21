<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de la Compra</title>
    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/Resumen.css">
    <link rel="stylesheet" href="../css/perfilModal.css">

    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
          <!-- Barra superior actualizada -->
    <div class="barra-superior">
        <div class="logo-container">
            <img src="../img/logo.png" alt="Logo TE LLEVO 21" class="logo-img">
            <span class="logo-text">TE LLEVO 21</span>
        </div>

        <nav class="nav-menu">
            <a href="#" onclick="redirigirMenu('Buscar')" class="nav-link active">
                <i class="fas fa-home"></i>
                <span class="nav-text">Inicio</span>
            </a>

            <a href="#" onclick="redirigirMenu('Actividad')" class="nav-link">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Actividad</span>
            </a>

            <a href="#" onclick="redirigirMenu('Notificaciones')" class="nav-link">
                <i class="fas fa-bell"></i>
                <span class="nav-text">Notificaciones</span>
            </a>
        </nav>

        <div class="perfil">
            <button type="button" class="perfil-btn" data-bs-toggle="modal" data-bs-target="#perfilModal">
                <i class="fas fa-user-circle"></i>
                <span>Mi Perfil</span>
            </button>
        </div>
    </div>
    <div class="container">
        <div class="resumen-compra">
            <h1>Resumen de la Compra</h1>
            <p><strong>Nombre del Transporte:</strong> <span id="nombre_transporte"></span></p>
            <p><strong>Viaje id:</strong> <span id="viaje_id"></span></p>
            <p><strong>Tipo de Viaje:</strong> <span id="tipo_viaje"></span></p>
            <p><strong>Hora de Inicio:</strong> <span id="hora_inicio"></span></p>
            <p><strong>Asientos Disponibles:</strong> <span id="asientos_disponibles"></span></p>
            <p><strong>Precio:</strong> ARS <span id="precio"></span></p>
            <p><strong>Cargo por servicio:</strong> ARS <span id="cargo_servicio"></span></p>
            <p><strong>Total:</strong> ARS <span id="total"></span></p>
          
        <!-- Botón para confirmar la reserva -->
        <button id="reservarBtn">Reservar</button>

    </div>

    <div id="modalContainer"></div>

    <script src="../carpeta.js/perfilModal.js"></script>
    <script src="../carpeta.js/Resumen.js"></script> 

    <!-- Modal de Pago -->
    <div class="modal fade" id="modalPago" tabindex="-1" aria-labelledby="modalPagoLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalPagoLabel">Método de Pago</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formPago">
                        <div class="mb-3">
                            <label for="numeroTarjeta" class="form-label">Número de Tarjeta</label>
                            <input type="text" class="form-control" id="numeroTarjeta" maxlength="16" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label for="fechaVencimiento" class="form-label">Fecha de Vencimiento</label>
                                <input type="text" class="form-control" id="fechaVencimiento" placeholder="MM/YY" maxlength="5" required>
                            </div>
                            <div class="col">
                                <label for="cvv" class="form-label">CVV</label>
                                <input type="text" class="form-control" id="cvv" maxlength="3" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="nombreTitular" class="form-label">Nombre del Titular</label>
                            <input type="text" class="form-control" id="nombreTitular" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="confirmarPago">Confirmar Pago</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
