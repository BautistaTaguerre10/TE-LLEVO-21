<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis viajes pendientes</title>
    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/MisViajes.css">
    <link rel="stylesheet" href="../css/perfilModal.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">


  
</head>

<body>
      <!-- Barra superior actualizada -->
      <div class="barra-superior">
        <div class="logo-container">
            <img src="../img/logo.png" alt="Logo TE LLEVO 21" class="logo-img">
            <span class="logo-text">TE LLEVO 21</span>
        </div>

        <nav class="nav-menu">
            <a href="#" onclick="redirigirMenu('Buscar')" class="nav-link active">
                <i class="fas fa-home"></i>
                <span class="nav-text">Inicio</span>
            </a>

            <a href="#" onclick="redirigirMenu('Actividad')" class="nav-link">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Actividad</span>
            </a>

            <a href="#" onclick="redirigirMenu('Notificaciones')" class="nav-link">
                <i class="fas fa-bell"></i>
                <span class="nav-text">Notificaciones</span>
            </a>
        </nav>

        <div class="perfil">
            <button type="button" class="perfil-btn" data-bs-toggle="modal" data-bs-target="#perfilModal">
                <i class="fas fa-user-circle"></i>
                <span>Mi Perfil</span>
            </button>
        </div>
    </div>
    <div class="container">
        
        <h1>MIS VIAJES CREADOS</h1>
       
        <div class="search-container">
            <div class="search-form">
                <div class="form-group">
                    <label for="searchInput">
                        <i class="fas fa-bus"></i> Nombre de Transporte
                    </label>
                    <input type="text" id="searchInput" placeholder="Ingrese el nombre del transporte">
                </div>
                
                <div class="form-group">
                    <label for="fecha">
                        <i class="fas fa-calendar"></i> Fecha
                    </label>
                    <input type="date" id="fecha" required>
                </div>
                
                <div class="botones-container">
                    <button id="searchButton">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                    <button id="showAllButton">
                        <i class="fas fa-list"></i> Mostrar Todos
                    </button>
                </div>
            </div>
        </div>

        <div id="itemsContainer">
            <!-- Aquí se mostrarán los viajes -->
        </div>

    </div>
    <div id="modalContainer"></div>

    <script src="../carpeta.js/perfilModal.js"></script>
    <script src="../carpeta.js/MisViajes.js"></script>
</body>

</html>
