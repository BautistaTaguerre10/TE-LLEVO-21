<!-- turno.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Viaje</title>
    
    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/perfilModal.css">
    <link rel="stylesheet" href="../css/TurnoConductor.css">
 


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
   
</head>
<body>
      <!-- Barra superior actualizada -->
      <div class="barra-superior">
        <div class="logo-container">
            <img src="../img/logo.png" alt="Logo TE LLEVO 21" class="logo-img">
            <span class="logo-text">TE LLEVO 21</span>
        </div>

        <nav class="nav-menu">
            <a href="#" onclick="redirigirMenu('Buscar')" class="nav-link active">
                <i class="fas fa-home"></i>
                <span class="nav-text">Inicio</span>
            </a>

            <a href="#" onclick="redirigirMenu('Actividad')" class="nav-link">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Actividad</span>
            </a>

            <a href="#" onclick="redirigirMenu('Notificaciones')" class="nav-link">
                <i class="fas fa-bell"></i>
                <span class="nav-text">Notificaciones</span>
            </a>
        </nav>

        <div class="perfil">
            <button type="button" class="perfil-btn" data-bs-toggle="modal" data-bs-target="#perfilModal">
                <i class="fas fa-user-circle"></i>
                <span>Mi Perfil</span>
            </button>
        </div>
    </div>
    <div class="container">
        <!-- Información del conductor con gradiente -->
        <div class="conductor-info">
            <h2>Bienvenido Conductor: <span id="name"></span></h2>
        </div>
        
        <!-- Título con línea decorativa -->
        <h1 class="turno-title">Crear Nuevo Viaje</h1>
        
        <!-- Formulario con grid y espaciado mejorado -->
        <form id="turnoForm">
            <div class="form-group">
                <label for="nombre_transporte">Nombre del Transporte:</label>
                <div class="input-icon">
                    <i class="fas fa-bus"></i>
                    <input type="text" id="nombre_transporte" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label for="fecha">Fecha:</label>
                <div class="input-icon">
                    <i class="fas fa-calendar-alt"></i>
                    <input type="date" id="fecha" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label for="hora">Hora:</label>
                <div class="input-icon">
                    <i class="fas fa-clock"></i>
                    <input type="time" id="hora" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label for="asientos_disponibles">Asientos Disponibles:</label>
                <div class="input-icon">
                    <i class="fas fa-users"></i>
                    <input type="number" id="asientos_disponibles" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label for="tipo_viaje">Tipo de Viaje:</label>
                <div class="input-icon">
                    <i class="fas fa-route"></i>
                    <select id="tipo_viaje" class="form-input" required>
                        <option value="ida">Nueva Córdoba / Campus siglo 21</option>
                        <option value="vuelta">Campus Siglo 21 / Nueva Córdoba</option>
                        <option value="ida_vuelta">Los dos viajes</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="precio">Precio:</label>
                <div class="input-icon">
                    <i class="fas fa-dollar-sign"></i>
                    <input type="number" id="precio" class="form-input" required>
                </div>
            </div>

            <button type="submit" class="submit-button">Crear Viaje</button>
        </form>

        <!-- Modal de confirmación actualizado -->
        <div id="confirmationModal" class="modal confirmation-modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <p>¡El viaje se ha creado exitosamente!</p>
                <button onclick="cerrarModal()" class="modal-button">Aceptar</button>
            </div>
        </div>
    </div>

    <div id="modalContainer"></div>

    <script src="../carpeta.js/perfilModal.js"></script>
    
    <script src="../carpeta.js/turno.js"></script>
</body>
</html>
