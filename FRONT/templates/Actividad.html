<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Reservas</title>
 
    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/Actividad.css">
    <link rel="stylesheet" href="../css/perfilModal.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

</head>
<body>
      <!-- Barra superior actualizada -->
      <div class="barra-superior">
        <div class="logo-container">
            <img src="../img/logo.png" alt="Logo TE LLEVO 21" class="logo-img">
            <span class="logo-text">TE LLEVO 21</span>
        </div>

        <nav class="nav-menu">
            <a href="#" onclick="redirigirMenu('Buscar')" class="nav-link active">
                <i class="fas fa-home"></i>
                <span class="nav-text">Inicio</span>
            </a>

            <a href="#" onclick="redirigirMenu('Actividad')" class="nav-link">
                <i class="fas fa-chart-line"></i>
                <span class="nav-text">Actividad</span>
            </a>

            <a href="#" onclick="redirigirMenu('Notificaciones')" class="nav-link">
                <i class="fas fa-bell"></i>
                <span class="nav-text">Notificaciones</span>
            </a>
        </nav>

        <div class="perfil">
            <button type="button" class="perfil-btn" data-bs-toggle="modal" data-bs-target="#perfilModal">
                <i class="fas fa-user-circle"></i>
                <span>Mi Perfil</span>
            </button>
        </div>
    </div>
    <!-- Contenedor principal -->
    <div class="actividades-container">
        <div class="actividades-header">
            <h2 id="tituloPagina">MIS RESERVAS</h2>
        </div>

        <!-- Contenedor para las reservas -->
        <div id="itemsContainer">
            <!-- Aquí se cargarán dinámicamente las reservas -->
        </div>
    </div>
    <div id="modalContainer"></div>
    <!-- Scripts -->
    <script src="../carpeta.js/perfilModal.js"></script>
    <script src="../carpeta.js/Actividad.js"></script>
</body>
</html>
