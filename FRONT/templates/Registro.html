<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>

    <link rel="stylesheet" href="../css/styles2.css">
    <link rel="stylesheet" href="../css/Registro.css">
</head>

<body>
    <div class="registro-container">
        <h1 class="registro-title">Registro de Usuarios</h1>
        
        <form id="registerForm" class="registro-form">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" class="registro-input" 
                       placeholder="Nombre de Usuario" required>
                <span class="validation-message">Por favor ingresa tu nombre</span>
            </div>

            <div class="form-group">
                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" class="registro-input" 
                       placeholder="Correo electrónico" required>
                <span class="validation-message">Ingresa un correo válido</span>
            </div>

            <div class="form-group">
                <label for="DNI">Documento:</label>
                <input type="number" id="DNI" class="registro-input" 
                       placeholder="Documento" required>
                <span class="validation-message">Ingresa tu documento</span>
            </div>

            <div class="form-group">
                <label for="Telefono">Teléfono:</label>
                <input type="number" id="Telefono" class="registro-input" 
                       placeholder="Teléfono" required>
                <span class="validation-message">Ingresa tu teléfono</span>
            </div>

            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" class="registro-input" 
                       placeholder="Contraseña" required>
                <span class="validation-message">Ingresa una contraseña</span>
            </div>

            <button type="submit" class="registro-button">Registrar</button>
        </form>

        <div id="confirmation"></div>
        
        <div class="registro-links">
            <button id="logoutButton" class="registro-button">Iniciar Sesión</button>
        </div>
    </div>

    <script src="../carpeta.js/Registro.js"></script>
</body>

</html>
